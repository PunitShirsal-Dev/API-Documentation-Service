# API Documentation Service Configuration
# Alternative to application.yml - Spring Boot will use application.yml if both exist

# Application Name
spring.application.name=API-Documentation-Service

# Server Configuration
server.port=8095

# Eureka Configuration
eureka.client.enabled=true
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

# SpringDoc OpenAPI Configuration
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus,openapi,swagger-ui
management.endpoint.health.show-details=always

# Logging Configuration (matches required format)
logging.level.com.netflix.eureka=INFO
logging.level.com.netflix.discovery=INFO
logging.level.root=INFO
logging.level.com.spunit.apidocs=DEBUG
logging.level.org.springdoc=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/api-documentation-service.log
logging.file.max-size=10MB
logging.file.max-history=30

